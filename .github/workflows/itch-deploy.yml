name: Deploy to itch.io

on:
  push:
    branches: [main, master]
    paths:
      - index.html
      - src/**
      - assets/**
      - package.json
      - .github/workflows/itch-deploy.yml
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: itch-deploy
  cancel-in-progress: true

env:
  ITCH_TARGET: dell7z/project-sh:html5

jobs:
  deploy-html5:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (if present)
        run: npm run build --if-present

      - name: Prepare upload directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy

          if [ -d dist ]; then
            cp -R dist/. deploy/
          elif [ -d build ]; then
            cp -R build/. deploy/
          else
            cp -R index.html src assets deploy/
          fi

          test -f deploy/index.html

      - name: Install Butler
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip -d butler
          chmod +x butler/butler

      - name: Validate deploy secrets
        shell: bash
        env:
          ITCH_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: |
          set -euo pipefail
          [ -n "${ITCH_API_KEY:-}" ] || (echo "Missing secret ITCH_API_KEY" && exit 1)

      - name: Push to itch.io
        shell: bash
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: ./butler/butler push deploy "$ITCH_TARGET"
