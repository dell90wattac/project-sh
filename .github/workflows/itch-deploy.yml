name: Deploy to itch.io

on:
  push:
    branches: [main, master]
    paths:
      - index.html
      - src/**
      - assets/**
      - package.json
      - .github/workflows/itch-deploy.yml
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: itch-deploy
  cancel-in-progress: true

env:
  ITCH_TARGET: dell7z/project-sh:html5

jobs:
  deploy-html5:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (if present)
        run: npm run build --if-present

      - name: Prepare upload directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy

          if [ -d dist ]; then
            cp -R dist/. deploy/
          elif [ -d build ]; then
            cp -R build/. deploy/
          else
            cp -R index.html src assets deploy/
          fi

          test -f deploy/index.html

      - name: Install Butler
        shell: bash
        run: |
          set -euo pipefail
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip -d butler
          chmod +x butler/butler

      - name: Validate deploy secrets
        shell: bash
        env:
          ITCH_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: |
          set -euo pipefail
          [ -n "${ITCH_API_KEY:-}" ] || (echo "Missing secret ITCH_API_KEY" && exit 1)

      - name: Compute itch version label
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ] && [ -n "${COMMIT_MSG:-}" ]; then
            version="$(printf '%s' "$COMMIT_MSG" | head -n1)"
          else
            version="nightly-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          fi

          target_tail="${ITCH_TARGET#*/}"
          game_slug="${target_tail%%:*}"
          channel_name="${target_tail##*:}"
          upload_name="${game_slug}-${channel_name}.zip"

          version="$(printf '%s' "$version" | tr -cd '[:alnum:]._ -' | sed 's/  */ /g; s/^ *//; s/ *$//')"
          [ -n "$version" ] || version="${GITHUB_SHA::7}"
          version="$version | $upload_name"

          echo "ITCH_USER_VERSION=$version" >> "$GITHUB_ENV"
          echo "Using itch user version: $version"

      - name: Push to itch.io
        shell: bash
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: ./butler/butler push deploy "$ITCH_TARGET" --userversion "$ITCH_USER_VERSION"
